version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "type: chore"
      - "dependencies"

  - package-ecosystem: "gomod"
    directory: "/server"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    labels:
      - "type: chore"
      - "area: backend"
      - "dependencies"
