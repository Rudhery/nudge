name: 💡 Feature request
description: Suggest an idea or improvement
title: "feat: <short description>"
labels: ["type: feature"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Describe the problem first, then your proposed solution.
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checklist
      options:
        - label: I searched existing issues and this hasn't been requested yet.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? Why does it matter?
      placeholder: "I'm always frustrated when ..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: dropdown
    id: module
    attributes:
      label: Related module
      options:
        - Tasks
        - Notes
        - Finance
        - Notifications / reminders
        - Backend / API
        - Infrastructure / tooling
        - New module
    validations:
      required: true
