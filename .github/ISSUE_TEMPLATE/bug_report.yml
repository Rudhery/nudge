name: 🐛 Bug report
description: Report something that isn't working as expected
title: "fix: <short description>"
labels: ["type: bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please fill in the details below.
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checklist
      options:
        - label: I searched existing issues and this hasn't been reported yet.
          required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: Affected module
      options:
        - Tasks
        - Notes
        - Finance
        - Notifications / reminders
        - Backend / API
        - Infrastructure / tooling
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android (Capacitor)
        - Web / PWA
        - Backend
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context / screenshots
    validations:
      required: false
