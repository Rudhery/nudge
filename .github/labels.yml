# Labels are managed as code and synced by .github/workflows/label-sync.yml
# Format reference: https://github.com/crazy-max/ghaction-github-labeler

# -- Type --------------------------------------------------------------
- name: "type: bug"
  color: "d73a4a"
  description: "Something isn't working"
- name: "type: feature"
  color: "0e8a16"
  description: "New feature or request"
- name: "type: task"
  color: "1d76db"
  description: "A concrete development task"
- name: "type: docs"
  color: "0075ca"
  description: "Documentation only changes"
- name: "type: refactor"
  color: "fbca04"
  description: "Code change that neither fixes a bug nor adds a feature"
- name: "type: test"
  color: "c2e0c6"
  description: "Adding or fixing tests"
- name: "type: chore"
  color: "fef2c0"
  description: "Tooling, build, or housekeeping"

# -- Priority ----------------------------------------------------------
- name: "priority: critical"
  color: "b60205"
  description: "Needs immediate attention"
- name: "priority: high"
  color: "d93f0b"
  description: "Should be done soon"
- name: "priority: medium"
  color: "fbca04"
  description: "Normal priority"
- name: "priority: low"
  color: "0e8a16"
  description: "Nice to have"

# -- Status ------------------------------------------------------------
- name: "status: in progress"
  color: "fbca04"
  description: "Work has started"
- name: "status: blocked"
  color: "b60205"
  description: "Blocked by something else"
- name: "status: needs review"
  color: "5319e7"
  description: "Waiting for review"
- name: "status: on hold"
  color: "bfbfbf"
  description: "Paused for now"

# -- Area --------------------------------------------------------------
- name: "area: tasks"
  color: "1d76db"
  description: "Tasks module"
- name: "area: finance"
  color: "0e8a16"
  description: "Finance module"
- name: "area: notes"
  color: "d4c5f9"
  description: "Notes module"
- name: "area: notifications"
  color: "006b75"
  description: "Reminders / WhatsApp delivery"
- name: "area: backend"
  color: "5319e7"
  description: "Go backend / API"
- name: "area: frontend"
  color: "e99695"
  description: "React / UI"
- name: "area: infra"
  color: "c5def5"
  description: "Tooling, CI, and project setup"

# -- Community ---------------------------------------------------------
- name: "good first issue"
  color: "7057ff"
  description: "Good for newcomers"
- name: "help wanted"
  color: "008672"
  description: "Extra attention is welcome"
- name: "question"
  color: "d876e3"
  description: "Further information is requested"
- name: "duplicate"
  color: "cfd3d7"
  description: "This already exists"
- name: "wontfix"
  color: "ffffff"
  description: "This will not be worked on"
- name: "dependencies"
  color: "0366d6"
  description: "Dependency updates"
